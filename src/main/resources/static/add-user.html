<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Existing Dashboard CSS -->
    <link rel="stylesheet"
        href="css/dashboard.css">

</head>

<body id="body">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">

        <div class="container-fluid px-4">

             <!-- Brand -->
<a class="navbar-brand d-flex align-items-center"
    href="#">

    <!-- Dark Theme Logo -->
    <img src="images/nexora-dark.png"
        id="darkLogo"
        class="bank-logo me-3 dark-logo"
        alt="NEXORA BANK">

    <!-- Light Theme Logo -->
    <img src="images/nexora-light.png"
        id="lightLogo"
        class="bank-logo me-3 light-logo"
        alt="NEXORA BANK">

    <!-- Text -->
    <div>

        <h5 class="mb-0 fw-bold">
            NEXORA BANK
        </h5>

        <small class="brand-subtitle">
            Secure Digital Banking
        </small>

    </div>

</a>


            <div class="d-flex align-items-center gap-3">

                <span class="welcome-text">
                    Create Account
                </span>

                <!-- Theme -->
                <button class="btn btn-outline-light"
                    id="themeToggle">

                    <i class="bi bi-moon-fill"
                        id="themeIcon"></i>

                </button>

                

                <!-- Logout -->
                <button class="btn btn-danger"
                    id="logoutBtn">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- Main -->
    <!-- Main -->
<main class="container py-5 flex-grow-1">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="balance-card mb-4">

                    <div class="row align-items-center">

                        <h2>
                            Create New ATM Account
                        </h2>

                        <p>
                            Register and manage customer
                            banking accounts securely
                        </p>

                    </div>

                    

                    <!-- Form -->
                    <form id="addUserForm">
                        <!-- Profile Photo -->
<div class="col-12 mb-4">

    <label class="form-label">
        Profile Photo
    </label>

    <div class="text-center mb-3">

        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
             id="photoPreview"
             class="rounded-circle border"
             width="120"
             height="120"
             style="object-fit: cover;">

    </div>

    <input type="file"
           id="profilePhoto"
           class="form-control"
           accept=".jpg,.jpeg,.png">

    <small class="text-muted">

        Allowed: JPG, JPEG, PNG
        (Max 2MB)

    </small>

</div>

                        <div class="row">

                            <!-- Name -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-person-fill"></i>

                                    </span>

                                    <input type="text"
                                        id="name"
                                        class="form-control"
                                        placeholder="Enter Full Name">

                                </div>

                            </div>

                            <!-- Account Number -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Account Number
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-credit-card-fill"></i>

                                    </span>

                                    <input type="text"
                                        id="accountNumber"
                                        class="form-control"
                                        readonly>

                                </div>

                            </div>

                            <!-- PIN -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    ATM PIN
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-lock-fill"></i>

                                    </span>

                                    <input type="password"
                                        id="pin"
                                        class="form-control"
                                        placeholder="Enter PIN">

                                    <button type="button"
                                        class="btn btn-outline-light togglePin">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                            </div>

                            <!-- Confirm PIN -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Confirm PIN
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-lock-fill"></i>

                                    </span>

                                    <input type="password"
                                        id="confirmPin"
                                        class="form-control"
                                        placeholder="Confirm PIN">

                                    <button type="button"
                                        class="btn btn-outline-light togglePin">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                            </div>

                            <!-- Balance -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Initial Balance
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-cash-stack"></i>

                                    </span>

                                    <input type="number"
                                        id="balance"
                                        class="form-control"
                                        placeholder="Enter Initial Balance">

                                </div>

                            </div>

                            <!-- Status -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Account Status
                                </label>

                                <select id="status"
                                    class="form-select">

                                    <option value="ACTIVE">
                                        ACTIVE
                                    </option>

                                    <option value="BLOCKED">
                                        BLOCKED
                                    </option>

                                </select>

                            </div>
                          <!-- EMAIL FULL ROW -->
<div class="col-12 mb-3">

    <label class="form-label">
        Email Address
    </label>

    <div class="input-group">

        <span class="input-group-text">
            <i class="bi bi-envelope-fill"></i>
        </span>

        <input type="email"
               id="email"
               class="form-control"
               placeholder="Enter Email Address">

        <button type="button"
                class="btn btn-warning"
                id="sendOtpBtn">

            Request OTP

        </button>

    </div>

</div>
<!-- PHONE -->
<div class="col-md-6 mb-3">

    <label class="form-label">
        Phone Number
    </label>

    <div class="input-group">

        <span class="input-group-text">
            <i class="bi bi-telephone-fill"></i>
        </span>

        <input type="text"
               id="mobileNumber"
               class="form-control"
               placeholder="Enter Phone Number"
               maxlength="10">

    </div>

</div>

<!-- OTP SECTION -->
<div id="otpSection"
     class="d-none mt-3">

    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label">
                Enter OTP
            </label>

            <input type="text"
                   id="otp"
                   class="form-control"
                   maxlength="6"
                   placeholder="Enter 6-digit OTP">

        </div>

        <div class="col-md-3 mb-3">

            <label class="form-label d-block">
                &nbsp;
            </label>

            <button type="button"
                    class="btn btn-success w-100"
                    id="verifyOtpBtn">

                Verify OTP

            </button>

        </div>

        <div class="col-md-3 mb-3">

            <label class="form-label d-block">
                &nbsp;
            </label>

            <button type="button"
                    class="btn btn-warning w-100"
                    id="resendOtpBtn"
                    disabled>

                Resend OTP
                (<span id="timer">30</span>s)

            </button>

        </div>

    </div>

</div>
                        <!-- Buttons -->
                        <div class="d-flex gap-3 mt-4">

                            <!-- Create -->
                           <button type="submit"
        class="btn btn-primary w-100 login-btn"
        id="createBtn"
        disabled>
                                <span id="btnText">
                                    Create Account
                                </span>

                                <span id="spinner"
                                    class="spinner-border spinner-border-sm d-none">
                                </span>

                            </button>
                            
                            <!-- Back -->
                            <a href="admin-dashboard.html"
                                class="btn btn-outline-light w-100">

                                Back To Dashboard

                            </a>

                        </div>
                    </form>
                </div>

            </div>
            <!-- Alert -->
                    <div id="alertBox"
                        class="alert d-none">
                    </div>

        </div>

    </main>

    <script src="js/add-user.js"></script>
 <!-- Footer -->
<footer class="footer text-center">

    © 2026 ATM Management System |
    Admin Portal

</footer>
</body>

</html>
