<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>User Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
        href="css/style.css">

</head>

<body id="body"
    class="login-body">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container-fluid px-4">

            <a class="navbar-brand d-flex align-items-center"
                href="#">

                <!-- Dark Theme Logo -->
                <img src="images/nexora-dark.png"
                    id="darkLogo"
                    class="bank-logo me-3 dark-logo"
                    alt="NEXORA BANK">

                <!-- Light Theme Logo -->
                <img src="images/nexora-light.png"
                    id="lightLogo"
                    class="bank-logo me-3 light-logo"
                    alt="NEXORA BANK">

                <!-- Text -->
                <div>

                    <h5 class="mb-0 fw-bold">
                        NEXORA BANK
                    </h5>

                    <small class="brand-subtitle">
                        Secure Digital Banking
                    </small>

                </div>

            </a>

            <div class="d-flex align-items-center gap-3">

                <span class="admin-text">
                    User Portal
                </span>

                <!-- Theme Toggle -->
                <button class="btn btn-outline-light"
                    id="themeToggle">

                    <i class="bi bi-moon-fill"
                        id="themeIcon"></i>

                </button>

                <!-- Back -->
                <a href="index.html"
                    class="btn btn-outline-light">

                    Back to Home

                </a>

            </div>

        </div>

    </nav>

    <!-- Login Section -->
    <div class="login-container">

        <div class="login-card">

            <div class="text-center mb-4">

               <i class="bi bi-person-fill"></i>

                <h2>User Login</h2>

                <p class="login-subtitle">
                    Secure ATM Banking Access
                </p>

            </div>

            <!-- Error Message -->
            <div id="errorMsg"
                class="alert alert-danger d-none">
            </div>

            <!-- Login Form -->
            <form id="loginForm">

                <!-- Account Number -->
                <div class="mb-3">

                    <label class="form-label">
                        Account Number
                    </label>

                    <input type="text"
                        id="accountNumber"
                        class="form-control"
                        placeholder="Enter Account Number">

                </div>

                <!-- PIN -->
                <div class="mb-3">

                    <label class="form-label">
                        PIN
                    </label>

                    <div class="input-group">

                        <input type="password"
                            id="pin"
                            class="form-control"
                            placeholder="Enter PIN">

                        <button type="button"
                            class="btn btn-outline-light"
                            id="togglePin">

                            <i class="bi bi-eye-fill"
                                id="eyeIcon"></i>

                        </button>

                    </div>

                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="btn btn-primary w-100 login-btn">

                    Login

                </button>

            </form>

        </div>

    </div>

    <!-- JS -->
    <script src="js/login.js"></script>

</body>

</html>
