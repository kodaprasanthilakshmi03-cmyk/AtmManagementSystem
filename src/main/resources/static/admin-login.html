<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
        href="css/style.css">

</head>

<body id="body">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container-fluid px-4">
             <a class="navbar-brand d-flex align-items-center"
    href="#">

    <!-- Dark Theme Logo -->
    <img src="images/nexora-dark.png"
        id="darkLogo"
        class="bank-logo me-3 dark-logo"
        alt="NEXORA BANK">

    <!-- Light Theme Logo -->
    <img src="images/nexora-light.png"
        id="lightLogo"
        class="bank-logo me-3 light-logo"
        alt="NEXORA BANK">

    <!-- Text -->
    <div>

        <h5 class="mb-0 fw-bold">
            NEXORA BANK
        </h5>

        <small class="brand-subtitle">
            Secure Digital Banking
        </small>

    </div>

</a>
            <div class="d-flex align-items-center gap-3">

                <span class="admin-text">
                    Admin Portal
                </span>

                <!-- Theme Toggle -->
                <button class="btn btn-outline-light"
                    id="themeToggle">

                    <i class="bi bi-moon-fill"
                        id="themeIcon"></i>

                </button>

                <!-- Back -->
                <a href="index.html"
                    class="btn btn-outline-light">

                    Back to Home

                </a>

            </div>

        </div>

    </nav>

    <!-- Login Container -->
    <div class="login-container">

        <div class="login-card">

            <div class="text-center mb-4">

                <i class="bi bi-shield-lock-fill"></i>

                <h2>Admin Login</h2>

                <p>
                    Secure Bank Administration Access
                </p>

            </div>

            <!-- Error -->
            <div id="errorMsg"
                class="alert alert-danger d-none">
            </div>

            <!-- Form -->
            <form id="adminLoginForm">

                <!-- Username -->
                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person-fill"></i>

                        </span>

                        <input type="text"
                            id="username"
                            class="form-control"
                            placeholder="Enter Username">

                    </div>

                </div>

                <!-- Password -->
                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock-fill"></i>

                        </span>

                        <input type="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter Password">

                        <button type="button"
                            class="btn btn-outline-light"
                            id="togglePassword">

                            <i class="bi bi-eye-fill"></i>

                        </button>

                    </div>

                </div>

                <!-- Remember -->
                <div class="form-check mb-3">

                    <input class="form-check-input"
                        type="checkbox"
                        id="rememberMe">

                    <label class="form-check-label">

                        Remember Me

                    </label>

                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="btn btn-primary w-100 login-btn"
                    id="loginBtn">

                    <span id="loginText">
                        Login
                    </span>

                    <span id="spinner"
                        class="spinner-border spinner-border-sm d-none">
                    </span>

                </button>

            </form>

        </div>

    </div>

    <!-- Footer -->
    <footer class="footer text-center">

        © 2026 ATM Management System |
        Admin Portal

    </footer>

    <script src="js/admin-login.js"></script>

</body>

</html>
